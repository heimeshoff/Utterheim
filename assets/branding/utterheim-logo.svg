<?xml version="1.0" encoding="UTF-8"?>
<!--
  Utterheim brand mark - speaking-head + Wi-Fi-arcs (main-028, draft 3).

  Design: an opaquely filled human head in profile facing right, with
  three Wi-Fi-style concentric arcs ("C" shapes) of progressively
  larger radius emerging from the mouth and fanning outward to the
  right. The arcs sit BEHIND the head silhouette in z-order so the
  head occludes the inner ends cleanly.

  Two-colour, hardcoded (not theme-adaptive):
    - Head silhouette : fill #ff8b00 (WhisperHeim brand orange;
                        WPF brush form: #FFff8b00)
    - Sound arcs      : stroke #25abfe (WhisperHeim brand cyan-blue;
                        WPF brush form: #FF25abfe)

  Note: SVG uses #RRGGBB hex (no alpha channel needed when fully
  opaque). The WPF brush form (#AARRGGBB with FF alpha prefix) is
  what the styleguide and task spec quote for XAML brushes; both
  refer to the same RGB colour.

  Pivot from drafts 1 and 2 (perched utterheim) to a speaking-head
  silhouette during sign-off iteration on 2026-05-05. Canvas remains
  256x256 with breathing room so the 16 px raster still keeps the
  head silhouette identifiable.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 256 256"
     width="256" height="256"
     role="img"
     aria-label="Utterheim logo: orange human head in profile with three blue Wi-Fi-style sound waves emerging from the mouth">
  <metadata>
    Utterheim speaking-head logo - main-028 draft 3.
    Two-colour mark: filled orange human-head silhouette in profile
    plus three concentric blue Wi-Fi arcs emerging from the mouth.
  </metadata>

  <!-- Sound arcs: three concentric near-quarter-circle strokes opening
       to the right, centred at the mouth (140, 140). Drawn FIRST so
       they sit behind the head silhouette; the inner ends tuck under
       the lips/chin so the head occludes them cleanly. Radii grow by
       roughly 1.4x so the gaps between arcs match the stroke weight
       at 24 px and stay readable. Stroke weight (12) matches draft 2's
       brand mass-balance. Rounded caps soften the arc tips.

       Each arc spans ~90 degrees from -45 deg (upper-right) to +45 deg
       (lower-right) of the mouth centre, so they fan symmetrically
       forward of the face. -->
  <g fill="none" stroke="#25abfe" stroke-width="12"
     stroke-linecap="round">
    <!-- Inner arc: r=32. Endpoints (140 +/- 22.6, 140 -/+ 22.6). -->
    <path d="M 163 117 A 32 32 0 0 1 163 163" />

    <!-- Middle arc: r=52. -->
    <path d="M 177 103 A 52 52 0 0 1 177 177" />

    <!-- Outer arc: r=74. -->
    <path d="M 192 88 A 74 74 0 0 1 192 192" />
  </g>

  <!-- Head silhouette: filled brand orange, profile facing right.
       Drawn ON TOP so the inner ends of the arcs are hidden behind
       the lips/chin/forehead.

       Anchor points (the silhouette is stylised, not anatomical):
         top of cranium       (88, 46)
         forehead curve crest (132, 56)
         brow / above nose    (146, 100)
         nose bridge dip      (142, 110)
         nose tip             (158, 124)   <- rightmost face point
         under-nose / philtrum(140, 132)
         upper lip            (148, 138)
         mouth opening        (140, 140)   <- arc centre
         lower lip            (146, 146)
         chin curve start     (140, 156)
         chin point           (134, 168)   <- lowest face point
         under jaw            (110, 178)
         front of neck        ( 96, 198)
         neck bottom right    ( 96, 222)
         neck bottom left     ( 56, 222)
         back of neck         ( 56, 188)
         back of cranium      ( 36, 130)
         top-back of head     ( 50, 70)
       Path traced clockwise from the top. -->
  <path fill="#ff8b00" stroke="none"
        d="M 88 46
           C 116 44, 138 50, 146 66
           C 152 78, 150 90, 146 100
           C 144 106, 142 110, 144 114
           C 146 118, 154 120, 158 124
           C 160 126, 160 128, 158 130
           C 154 132, 144 132, 142 134
           C 142 136, 144 138, 148 138
           C 152 140, 152 144, 148 146
           C 144 148, 142 150, 142 154
           C 142 160, 140 164, 138 167
           C 136 170, 134 172, 132 174
           C 124 178, 116 180, 108 180
           C 102 180, 98 184, 96 190
           L 96 222
           L 56 222
           L 56 188
           C 56 174, 50 162, 42 152
           C 30 134, 28 110, 34 86
           C 42 60, 64 48, 88 46 Z" />
</svg>
